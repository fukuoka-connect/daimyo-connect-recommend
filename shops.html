<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ナッツのおすすめ 全14店 — CURATOR'S PICK | DAIMYOU CONNECT</title>
  <meta name="description" content="ナッツが本気でおすすめする福岡の14店一覧。大名・薬院・博多冷泉町・野間・宇美町・唐津エリアのバー・居酒屋・カクテルバー・食事処。エリア・ジャンルで絞り込み可能。">
  <link rel="canonical" href="https://daimyo-connect-recommend.vercel.app/shops.html">
  <meta property="og:title" content="ナッツのおすすめ 全14店 — CURATOR'S PICK">
  <meta property="og:description" content="ナッツが本気でおすすめする福岡の14店。エリア・ジャンルで絞り込んで探せます。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://daimyo-connect-recommend.vercel.app/shops.html">
  <meta property="og:site_name" content="CURATOR'S PICK by NUTS">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0c0a10;
      --bg-2:        #13101b;
      --surface:     #1a1626;
      --surface-2:   #221d30;
      --border:      rgba(200,150,60,0.15);
      --border-dim:  rgba(255,255,255,0.06);
      --text:        #f0ebe0;
      --text-mid:    #a08a6e;
      --text-dim:    #5a4e42;
      --accent:      #c8963c;
      --accent-warm: #dfa83c;
      --red:         #7d2030;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      line-height: 1.7;
      overflow-x: hidden;
    }

    .sm { font-size: 0.78em; }

    /* ========= HEADER ========= */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(12,10,16,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-dim);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-decoration: none;
    }

    .site-logo span {
      font-size: 0.68em;
      color: var(--text-mid);
      font-style: italic;
      margin-left: 6px;
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .site-nav a {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-mid);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.22s cubic-bezier(.25,.46,.45,.94);
    }

    .site-nav a:hover { color: var(--accent); }

    .site-nav .nav-cta {
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 2px;
    }

    .site-nav .nav-cta:hover { background: rgba(200,150,60,0.08); }

    /* ========= PAGE HEADER ========= */
    .page-header {
      padding: 48px 24px 32px;
      max-width: 640px;
      margin: 0 auto;
    }

    .page-header-eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .page-header-title {
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 800;
      line-height: 1.3;
      color: var(--text);
    }

    .page-header-count {
      margin-top: 10px;
      font-size: 0.82rem;
      color: var(--text-mid);
    }

    .page-header-count span {
      color: var(--accent);
      font-weight: 700;
    }

    /* ========= FILTER BAR ========= */
    .filter-section {
      padding: 0 24px 24px;
      max-width: 640px;
      margin: 0 auto;
    }

    .filter-group {
      margin-bottom: 12px;
    }

    .filter-group-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border-dim);
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--text-mid);
      cursor: pointer;
      user-select: none;
      transition: background 0.22s cubic-bezier(.25,.46,.45,.94), color 0.22s cubic-bezier(.25,.46,.45,.94), border-color 0.22s cubic-bezier(.25,.46,.45,.94);
      white-space: nowrap;
    }

    .chip:hover {
      border-color: var(--border);
      color: var(--text);
    }

    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
      font-weight: 700;
    }

    /* ========= VIEW TOGGLE ========= */
    .view-toggle {
      padding: 0 24px 20px;
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
    }

    .view-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border-dim);
      border-radius: 2px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-mid);
      cursor: pointer;
      transition: background 0.22s cubic-bezier(.25,.46,.45,.94), color 0.22s cubic-bezier(.25,.46,.45,.94), border-color 0.22s cubic-bezier(.25,.46,.45,.94);
    }

    .view-btn.active {
      background: var(--surface-2);
      border-color: var(--border);
      color: var(--accent);
    }

    .view-btn:hover:not(.active) {
      border-color: var(--border-dim);
      color: var(--text);
    }

    /* ========= MAP VIEW ========= */
    #map-container {
      width: 100%;
      height: 60vw;
      max-height: 440px;
      min-height: 280px;
      margin-bottom: 24px;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .leaflet-container { background: #0c0a10 !important; }

    /* custom circle marker label */
    .map-pin {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .map-pin:hover { transform: scale(1.2); }

    /* ========= LIST VIEW ========= */
    #list-container {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 24px 48px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .shop-card {
      display: flex;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--border-dim);
      border-radius: 4px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.22s cubic-bezier(.25,.46,.45,.94), transform 0.22s cubic-bezier(.25,.46,.45,.94);
    }

    .shop-card:hover {
      border-color: var(--border);
      transform: translateX(3px);
    }

    .shop-card-area-bar {
      width: 4px;
      flex-shrink: 0;
    }

    .shop-card-photo {
      width: 120px;
      flex-shrink: 0;
      background: var(--surface-2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      position: relative;
      overflow: hidden;
    }

    .shop-card-photo::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 6px,
        rgba(255,255,255,0.015) 6px,
        rgba(255,255,255,0.015) 7px
      );
    }

    .shop-card-photo-emoji {
      font-size: 1.6rem;
      position: relative;
      z-index: 1;
    }

    .shop-card-photo-label {
      font-size: 0.58rem;
      color: var(--text-dim);
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 0 6px;
    }

    .shop-card-body {
      flex: 1;
      padding: 14px 16px;
      min-width: 0;
    }

    .shop-card-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .tag {
      font-size: 0.65rem;
      color: var(--text-mid);
      background: var(--surface-2);
      border: 1px solid var(--border-dim);
      padding: 2px 7px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .shop-card-name {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .shop-card-comment {
      font-size: 0.78rem;
      color: var(--text-mid);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .shop-card-comment.placeholder {
      font-style: italic;
      color: var(--text-dim);
    }

    .no-results {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-mid);
      font-size: 0.9rem;
    }

    /* ========= FOOTER ========= */
    .site-footer {
      background: var(--bg);
      border-top: 1px solid var(--border-dim);
      padding: 40px 24px;
      text-align: center;
    }

    .footer-powered {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .footer-powered a {
      color: var(--text-mid);
      text-decoration: none;
      transition: color 0.22s cubic-bezier(.25,.46,.45,.94);
    }

    .footer-powered a:hover { color: var(--accent); }

    .footer-event-link {
      display: inline-block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.1em;
      opacity: 0.8;
      transition: opacity 0.22s cubic-bezier(.25,.46,.45,.94);
    }

    .footer-event-link:hover { opacity: 1; }

    /* leaflet overrides for dark theme */
    .leaflet-tile-pane { filter: brightness(0.9); }
    .leaflet-attribution-flag { display: none !important; }
    .leaflet-control-attribution {
      background: rgba(12,10,16,0.75) !important;
      color: var(--text-dim) !important;
      font-size: 0.6rem !important;
    }

    .leaflet-control-attribution a { color: var(--text-mid) !important; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <a href="/" class="site-logo">NUTS PICKS <span>by DAIMYOU CONNECT</span></a>
    <nav class="site-nav">
      <a href="shops.html" class="nav-cta">店を見る</a>
      <a href="https://daimyo-connect.vercel.app/" target="_blank" rel="noopener">イベント</a>
    </nav>
  </header>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <p class="page-header-eyebrow">Curator's Pick</p>
    <h1 class="page-header-title">ナッツのおすすめ<span class="sm"> /</span> 14の店</h1>
    <p class="page-header-count">表示中 <span id="result-count">14</span> 件</p>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-section">
    <div class="filter-group">
      <div class="filter-group-label">エリア</div>
      <div class="chips" id="area-chips"></div>
    </div>
    <div class="filter-group">
      <div class="filter-group-label">ジャンル</div>
      <div class="chips" id="genre-chips"></div>
    </div>
  </div>

  <!-- VIEW TOGGLE -->
  <div class="view-toggle">
    <button class="view-btn active" id="btn-list" aria-pressed="true">リスト</button>
    <button class="view-btn" id="btn-map" aria-pressed="false">マップ</button>
  </div>

  <!-- MAP VIEW -->
  <div id="map-container" style="display:none;">
    <div id="map"></div>
  </div>

  <!-- LIST VIEW -->
  <div id="list-container"></div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p class="footer-powered">Powered by <a href="https://fukuoka-connect.github.io/" target="_blank" rel="noopener">Fukuoka Connect</a></p>
    <a href="https://daimyo-connect.vercel.app/" target="_blank" rel="noopener" class="footer-event-link">DAIMYOU CONNECT 2026</a>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    'use strict';

    function escHtml(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    const AREA_COLORS = {
      '大名':       '#c8963c',
      '薬院':       '#e07850',
      '博多冷泉町':  '#4a96c8',
      '野間大池':   '#5a9e58',
      '野間四角':   '#6eb86e',
      '宇美町':     '#a85ab4',
      '唐津':       '#46b4a0',
    };

    const GENRE_EMOJI = {
      'バー':         '🍸',
      '居酒屋':       '🍺',
      'カクテルバー':  '🍹',
      'ヘアサロン':    '✂️',
      'BBQ・海の家':   '🏖️',
      '焼きそば':     '🍜',
      '和食・食事処':  '🍱',
      '居酒屋・食事処':'🍽️',
    };

    const AREAS = ['大名', '薬院', '博多冷泉町', '野間大池', '野間四角', '宇美町', '唐津'];
    const GENRES = ['バー', '居酒屋', 'カクテルバー', 'ヘアサロン', 'BBQ・海の家', '焼きそば', '和食・食事処', '居酒屋・食事処'];

    let allShops = [];
    let activeArea = null;
    let activeGenre = null;
    let currentView = 'list';
    let leafletMap = null;
    let mapMarkers = [];

    async function loadShops() {
      try {
        const res = await fetch('/data/shops.json');
        const { shops } = await res.json();
        return shops;
      } catch (e) {
        console.error('shops.json 読み込みエラー', e);
        return [];
      }
    }

    function buildFilters() {
      const areaChips = document.getElementById('area-chips');
      const genreChips = document.getElementById('genre-chips');

      // ALL chip for area
      const allAreaChip = makeChip('すべて', true, () => { activeArea = null; syncChips('area'); render(); });
      allAreaChip.dataset.val = '__all__';
      areaChips.appendChild(allAreaChip);

      AREAS.forEach(area => {
        const chip = makeChip(area, false, () => {
          activeArea = activeArea === area ? null : area;
          syncChips('area');
          render();
        });
        chip.dataset.val = area;
        areaChips.appendChild(chip);
      });

      // ALL chip for genre
      const allGenreChip = makeChip('すべて', true, () => { activeGenre = null; syncChips('genre'); render(); });
      allGenreChip.dataset.val = '__all__';
      genreChips.appendChild(allGenreChip);

      GENRES.forEach(genre => {
        const chip = makeChip(genre, false, () => {
          activeGenre = activeGenre === genre ? null : genre;
          syncChips('genre');
          render();
        });
        chip.dataset.val = genre;
        genreChips.appendChild(chip);
      });
    }

    function makeChip(label, isActive, onClick) {
      const btn = document.createElement('button');
      btn.className = 'chip' + (isActive ? ' active' : '');
      btn.textContent = label;
      btn.addEventListener('click', onClick);
      return btn;
    }

    function syncChips(type) {
      const containerId = type === 'area' ? 'area-chips' : 'genre-chips';
      const activeVal = type === 'area' ? activeArea : activeGenre;
      const chips = document.querySelectorAll('#' + containerId + ' .chip');
      chips.forEach(chip => {
        const val = chip.dataset.val;
        if (!activeVal) {
          chip.classList.toggle('active', val === '__all__');
        } else {
          chip.classList.toggle('active', val === activeVal);
        }
      });
    }

    function filteredShops() {
      return allShops.filter(s => {
        if (activeArea && s.area !== activeArea) return false;
        if (activeGenre && s.genre !== activeGenre) return false;
        return true;
      });
    }

    function render() {
      const shops = filteredShops();
      document.getElementById('result-count').textContent = shops.length;
      if (currentView === 'list') renderList(shops);
      else renderMapMarkers(shops);
    }

    function renderList(shops) {
      const container = document.getElementById('list-container');
      container.innerHTML = '';

      if (!shops.length) {
        container.innerHTML = '<div class="no-results">条件に合う店が見つかりませんでした。</div>';
        return;
      }

      shops.forEach(shop => {
        const color = AREA_COLORS[shop.area] || '#c8963c';
        const emoji = GENRE_EMOJI[shop.genre] || '🏪';
        const shortComment = shop.nutsComment && shop.nutsComment.short;
        const isPlaceholder = !shortComment || shortComment.startsWith('【');
        const commentText = isPlaceholder ? 'ナッツのコメントを準備中です。' : shortComment;

        const card = document.createElement('a');
        card.href = 'shop.html?id=' + encodeURIComponent(shop.id);
        card.className = 'shop-card';
        card.setAttribute('aria-label', shop.name);
        card.innerHTML =
          '<div class="shop-card-area-bar" style="background:' + color + ';"></div>' +
          '<div class="shop-card-photo">' +
            '<span class="shop-card-photo-emoji">' + emoji + '</span>' +
            '<span class="shop-card-photo-label">photo coming soon</span>' +
          '</div>' +
          '<div class="shop-card-body">' +
            '<div class="shop-card-tags">' +
              '<span class="tag">' + escHtml(shop.area) + '</span>' +
              '<span class="tag">' + escHtml(shop.genre) + '</span>' +
            '</div>' +
            '<div class="shop-card-name">' + escHtml(shop.name) + '</div>' +
            '<div class="shop-card-comment' + (isPlaceholder ? ' placeholder' : '') + '">' + escHtml(commentText) + '</div>' +
          '</div>';
        container.appendChild(card);
      });
    }

    function initMap() {
      if (leafletMap) return;
      leafletMap = L.map('map', { zoomControl: true, scrollWheelZoom: false, attributionControl: true });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_matter_labels/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a> &copy; <a href="https://carto.com">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 19,
      }).addTo(leafletMap);
      renderMapMarkers(filteredShops());
      fitMapBounds(allShops);
    }

    function renderMapMarkers(shops) {
      if (!leafletMap) return;
      mapMarkers.forEach(m => leafletMap.removeLayer(m));
      mapMarkers = [];

      shops.forEach(shop => {
        if (!shop.coordinates) return;
        const color = AREA_COLORS[shop.area] || '#c8963c';
        const initial = (shop.name || '?').slice(0, 1);
        const icon = L.divIcon({
          className: '',
          html: '<div class="map-pin" style="background:' + color + ';width:32px;height:32px;">' + escHtml(initial) + '</div>',
          iconSize: [32, 32],
          iconAnchor: [16, 16],
          popupAnchor: [0, -18],
        });
        const marker = L.marker([shop.coordinates.lat, shop.coordinates.lng], { icon })
          .addTo(leafletMap)
          .bindPopup(
            '<strong style="font-family:serif;">' + escHtml(shop.name) + '</strong><br>' +
            '<span style="font-size:0.78rem;color:#a08a6e;">' + escHtml(shop.area) + ' / ' + escHtml(shop.genre) + '</span><br>' +
            '<a href="shop.html?id=' + encodeURIComponent(shop.id) + '" style="font-size:0.8rem;color:#c8963c;">詳細を見る →</a>',
            { className: 'map-popup' }
          );
        mapMarkers.push(marker);
      });

      if (shops.length && leafletMap) {
        fitMapBounds(shops);
      }
    }

    function fitMapBounds(shops) {
      const coords = shops.filter(s => s.coordinates).map(s => [s.coordinates.lat, s.coordinates.lng]);
      if (coords.length) {
        leafletMap.fitBounds(L.latLngBounds(coords), { padding: [24, 24] });
      }
    }

    function initViewToggle() {
      document.getElementById('btn-list').addEventListener('click', () => {
        currentView = 'list';
        document.getElementById('btn-list').classList.add('active');
        document.getElementById('btn-map').classList.remove('active');
        document.getElementById('btn-list').setAttribute('aria-pressed', 'true');
        document.getElementById('btn-map').setAttribute('aria-pressed', 'false');
        document.getElementById('map-container').style.display = 'none';
        document.getElementById('list-container').style.display = '';
        render();
      });

      document.getElementById('btn-map').addEventListener('click', () => {
        currentView = 'map';
        document.getElementById('btn-map').classList.add('active');
        document.getElementById('btn-list').classList.remove('active');
        document.getElementById('btn-map').setAttribute('aria-pressed', 'true');
        document.getElementById('btn-list').setAttribute('aria-pressed', 'false');
        document.getElementById('map-container').style.display = '';
        document.getElementById('list-container').style.display = 'none';
        initMap();
        setTimeout(() => leafletMap && leafletMap.invalidateSize(), 100);
        render();
      });
    }

    (async () => {
      allShops = await loadShops();
      buildFilters();
      initViewToggle();
      render();
    })();
  </script>
</body>
</html>
