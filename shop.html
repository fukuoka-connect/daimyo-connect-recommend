<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">店舗詳細 — CURATOR'S PICK | DAIMYOU CONNECT</title>
  <meta name="description" id="page-description" content="ナッツが本気でおすすめする店の詳細情報。">
  <link rel="canonical" href="https://daimyo-connect-recommend.vercel.app/shop.html">
  <meta property="og:title" id="og-title" content="店舗詳細 — CURATOR'S PICK">
  <meta property="og:description" id="og-description" content="ナッツが本気でおすすめする店の詳細情報。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="CURATOR'S PICK by NUTS">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0c0a10;
      --bg-2:        #13101b;
      --surface:     #1a1626;
      --surface-2:   #221d30;
      --border:      rgba(200,150,60,0.15);
      --border-dim:  rgba(255,255,255,0.06);
      --text:        #f0ebe0;
      --text-mid:    #a08a6e;
      --text-dim:    #5a4e42;
      --accent:      #c8963c;
      --accent-warm: #dfa83c;
      --red:         #7d2030;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      line-height: 1.7;
      overflow-x: hidden;
    }

    .sm { font-size: 0.78em; }

    /* ========= HEADER ========= */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(12,10,16,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-dim);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-decoration: none;
    }

    .site-logo span {
      font-size: 0.68em;
      color: var(--text-mid);
      font-style: italic;
      margin-left: 6px;
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .site-nav a {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-mid);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.22s cubic-bezier(.25,.46,.45,.94);
    }

    .site-nav a:hover { color: var(--accent); }

    .site-nav .nav-cta {
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 2px;
    }

    .site-nav .nav-cta:hover { background: rgba(200,150,60,0.08); }

    /* ========= BACK LINK ========= */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 20px 24px 0;
      font-size: 0.8rem;
      color: var(--text-mid);
      text-decoration: none;
      transition: color 0.22s cubic-bezier(.25,.46,.45,.94);
    }

    .back-link:hover { color: var(--accent); }

    /* ========= MAIN CONTENT ========= */
    .content {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 24px 64px;
    }

    /* ========= PHOTO AREA ========= */
    .shop-photo {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--surface-2);
      margin: 20px 0;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
    }

    .shop-photo::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 8px,
        rgba(255,255,255,0.018) 8px,
        rgba(255,255,255,0.018) 9px
      );
    }

    .shop-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 4px;
    }

    .shop-photo-emoji {
      font-size: 3rem;
      position: relative;
      z-index: 1;
    }

    .shop-photo-name {
      font-family: 'Shippori Mincho', serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-mid);
      position: relative;
      z-index: 1;
    }

    .shop-photo-soon {
      font-size: 0.7rem;
      color: var(--text-dim);
      position: relative;
      z-index: 1;
    }

    /* ========= SHOP TITLE ========= */
    .shop-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .tag {
      font-size: 0.68rem;
      color: var(--text-mid);
      background: var(--surface-2);
      border: 1px solid var(--border-dim);
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .tag.area-tag {
      color: var(--bg);
      border-color: transparent;
      font-weight: 700;
    }

    .shop-name {
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(1.6rem, 6vw, 2rem);
      font-weight: 800;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 24px;
    }

    /* ========= NUTS COMMENT ========= */
    .nuts-comment {
      background: var(--surface);
      border-left: 4px solid var(--accent);
      border-radius: 0 4px 4px 0;
      padding: 20px 20px 20px 20px;
      margin-bottom: 32px;
    }

    .nuts-comment-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .nuts-comment-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .avatar {
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      color: var(--bg);
      flex-shrink: 0;
      border: 2px solid rgba(200,150,60,0.3);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .avatar-40 { width: 40px; height: 40px; font-size: 1rem; }
    .avatar-64 { width: 64px; height: 64px; font-size: 1.4rem; }

    .nuts-comment-body {
      font-family: 'Shippori Mincho', serif;
      font-size: 1rem;
      line-height: 1.9;
      color: var(--text);
      margin-bottom: 14px;
      white-space: pre-wrap;
    }

    .nuts-comment-body.placeholder {
      color: var(--text-mid);
      font-style: italic;
    }

    .nuts-comment-byline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--accent);
      letter-spacing: 0.06em;
    }

    /* ========= OWNER SECTION ========= */
    .owner-section {
      background: var(--bg-2);
      border: 1px solid var(--border-dim);
      border-radius: 4px;
      padding: 20px;
      margin-bottom: 28px;
    }

    .owner-section-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .owner-card {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .owner-placeholder {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--border-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-mid);
      flex-shrink: 0;
    }

    .owner-name {
      font-family: 'Shippori Mincho', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .owner-bio {
      font-size: 0.82rem;
      color: var(--text-mid);
      line-height: 1.7;
    }

    /* ========= INFO TABLE ========= */
    .info-section {
      margin-bottom: 28px;
    }

    .info-section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-dim);
    }

    .info-row {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-dim);
      align-items: flex-start;
    }

    .info-row:last-child { border-bottom: none; }

    .info-icon {
      width: 20px;
      flex-shrink: 0;
      font-size: 0.9rem;
      padding-top: 1px;
    }

    .info-label {
      width: 60px;
      flex-shrink: 0;
      font-size: 0.75rem;
      color: var(--text-dim);
      font-weight: 500;
      padding-top: 2px;
    }

    .info-value {
      flex: 1;
      font-size: 0.88rem;
      color: var(--text-mid);
      line-height: 1.6;
    }

    .info-value a {
      color: var(--accent);
      text-decoration: none;
      transition: opacity 0.22s cubic-bezier(.25,.46,.45,.94);
    }

    .info-value a:hover { opacity: 0.75; }

    /* ========= ACTION BUTTONS ========= */
    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 32px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 12px;
      border-radius: 2px;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      border: 1px solid var(--border-dim);
      background: var(--surface);
      color: var(--text-mid);
      transition: background 0.22s cubic-bezier(.25,.46,.45,.94), border-color 0.22s cubic-bezier(.25,.46,.45,.94), color 0.22s cubic-bezier(.25,.46,.45,.94), transform 0.22s cubic-bezier(.25,.46,.45,.94);
    }

    .action-btn:hover {
      background: var(--surface-2);
      border-color: var(--border);
      color: var(--text);
      transform: translateY(-1px);
    }

    .action-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
      grid-column: 1 / -1;
    }

    .action-btn.primary:hover {
      background: var(--accent-warm);
      border-color: var(--accent-warm);
    }

    /* ========= NEARBY SECTION ========= */
    .nearby-section {
      border-top: 1px solid var(--border-dim);
      padding-top: 28px;
      margin-top: 8px;
    }

    .nearby-section-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .nearby-section-title {
      font-family: 'Shippori Mincho', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
    }

    .nearby-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      scroll-snap-type: x mandatory;
      padding-bottom: 4px;
    }

    .nearby-scroll::-webkit-scrollbar { display: none; }

    .nearby-card {
      flex-shrink: 0;
      width: 160px;
      background: var(--surface);
      border: 1px solid var(--border-dim);
      border-radius: 4px;
      overflow: hidden;
      text-decoration: none;
      scroll-snap-align: start;
      transition: border-color 0.22s cubic-bezier(.25,.46,.45,.94), transform 0.22s cubic-bezier(.25,.46,.45,.94);
    }

    .nearby-card:hover {
      border-color: var(--border);
      transform: translateY(-2px);
    }

    .nearby-card-photo {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      position: relative;
      overflow: hidden;
    }

    .nearby-card-photo::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 6px,
        rgba(255,255,255,0.015) 6px,
        rgba(255,255,255,0.015) 7px
      );
    }

    .nearby-card-bar { height: 3px; }

    .nearby-card-body { padding: 10px 12px; }

    .nearby-card-name {
      font-family: 'Shippori Mincho', serif;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nearby-card-genre {
      font-size: 0.65rem;
      color: var(--text-mid);
    }

    /* ========= FOOTER ========= */
    .site-footer {
      background: var(--bg);
      border-top: 1px solid var(--border-dim);
      padding: 40px 24px;
      text-align: center;
    }

    .footer-powered {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .footer-powered a {
      color: var(--text-mid);
      text-decoration: none;
      transition: color 0.22s cubic-bezier(.25,.46,.45,.94);
    }

    .footer-powered a:hover { color: var(--accent); }

    .footer-event-link {
      display: inline-block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.1em;
      opacity: 0.8;
      transition: opacity 0.22s cubic-bezier(.25,.46,.45,.94);
    }

    .footer-event-link:hover { opacity: 1; }

    /* ========= LOADING / ERROR ========= */
    .loading {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-mid);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <a href="/" class="site-logo">NUTS PICKS <span>by DAIMYOU CONNECT</span></a>
    <nav class="site-nav">
      <a href="shops.html" class="nav-cta">店を見る</a>
      <a href="https://daimyo-connect.vercel.app/" target="_blank" rel="noopener">イベント</a>
    </nav>
  </header>

  <!-- BACK LINK -->
  <a href="shops.html" class="back-link">← 一覧に戻る</a>

  <!-- MAIN CONTENT -->
  <main class="content" id="main-content">
    <div class="loading" id="loading">読み込み中...</div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p class="footer-powered">Powered by <a href="https://fukuoka-connect.github.io/" target="_blank" rel="noopener">Fukuoka Connect</a></p>
    <a href="https://daimyo-connect.vercel.app/" target="_blank" rel="noopener" class="footer-event-link">DAIMYOU CONNECT 2026</a>
  </footer>

  <script>
    'use strict';

    function escHtml(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    const AREA_COLORS = {
      '大名':       '#c8963c',
      '薬院':       '#e07850',
      '博多冷泉町':  '#4a96c8',
      '野間大池':   '#5a9e58',
      '野間四角':   '#6eb86e',
      '宇美町':     '#a85ab4',
      '唐津':       '#46b4a0',
    };

    const GENRE_EMOJI = {
      'バー':         '🍸',
      '居酒屋':       '🍺',
      'カクテルバー':  '🍹',
      'ヘアサロン':    '✂️',
      'BBQ・海の家':   '🏖️',
      '焼きそば':     '🍜',
      '和食・食事処':  '🍱',
      '居酒屋・食事処':'🍽️',
    };

    function getQueryId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    async function loadData() {
      try {
        const [cRes, sRes] = await Promise.all([
          fetch('/data/curator.json'),
          fetch('/data/shops.json'),
        ]);
        const curator = await cRes.json();
        const { shops } = await sRes.json();
        return { curator, shops };
      } catch (e) {
        console.error('データ読み込みエラー', e);
        return null;
      }
    }

    function buildNearbyCard(shop) {
      const color = AREA_COLORS[shop.area] || '#c8963c';
      const emoji = GENRE_EMOJI[shop.genre] || '🏪';
      const card = document.createElement('a');
      card.href = 'shop.html?id=' + encodeURIComponent(shop.id);
      card.className = 'nearby-card';
      card.setAttribute('aria-label', shop.name);
      card.innerHTML =
        '<div class="nearby-card-photo"><span style="position:relative;z-index:1;">' + emoji + '</span></div>' +
        '<div class="nearby-card-bar" style="background:' + color + ';"></div>' +
        '<div class="nearby-card-body">' +
          '<div class="nearby-card-name">' + escHtml(shop.name) + '</div>' +
          '<div class="nearby-card-genre">' + escHtml(shop.genre) + '</div>' +
        '</div>';
      return card;
    }

    function renderShop(shop, shops, curator) {
      const main = document.getElementById('main-content');
      const color = AREA_COLORS[shop.area] || '#c8963c';
      const emoji = GENRE_EMOJI[shop.genre] || '🏪';

      // Update meta
      document.getElementById('page-title').textContent = escHtml(shop.name) + ' — CURATOR\'S PICK | DAIMYOU CONNECT';
      document.getElementById('og-title').content = escHtml(shop.name) + ' — CURATOR\'S PICK';

      const longComment = shop.nutsComment && shop.nutsComment.long;
      const isCommentPlaceholder = !longComment || longComment.startsWith('【');
      const commentDisplay = isCommentPlaceholder ? 'ナッツのコメントを準備中です。' : longComment;

      if (longComment && !isCommentPlaceholder) {
        document.getElementById('page-description').content = escHtml(shop.name) + ' — ' + longComment.slice(0, 100);
        document.getElementById('og-description').content = escHtml(shop.name) + ' — ' + longComment.slice(0, 100);
      }

      // Photo HTML
      const photoHtml =
        '<div class="shop-photo">' +
          '<span class="shop-photo-emoji">' + emoji + '</span>' +
          '<span class="shop-photo-name">' + escHtml(shop.name) + '</span>' +
          '<span class="shop-photo-soon">photo coming soon</span>' +
        '</div>';

      // Tags
      const tagsHtml =
        '<div class="shop-tags">' +
          '<span class="tag area-tag" style="background:' + color + ';">' + escHtml(shop.area) + '</span>' +
          '<span class="tag">' + escHtml(shop.genre) + '</span>' +
        '</div>';

      // Nuts comment
      const avatarHtml = curator && curator.photo
        ? '<img src="' + escHtml(curator.photo) + '" alt="' + escHtml(curator.name) + '">'
        : (curator ? escHtml(curator.photoPlaceholder || 'N') : 'N');
      const nutsName = curator ? curator.name : 'ナッツ';

      const nutsCommentHtml =
        '<div class="nuts-comment">' +
          '<div class="nuts-comment-header">' +
            '<div class="avatar avatar-40">' + avatarHtml + '</div>' +
            '<span class="nuts-comment-label">ナッツのおすすめ</span>' +
          '</div>' +
          '<div class="nuts-comment-body' + (isCommentPlaceholder ? ' placeholder' : '') + '">' + escHtml(commentDisplay) + '</div>' +
          '<div class="nuts-comment-byline">— ' + escHtml(nutsName) + '</div>' +
        '</div>';

      // Owner section
      let ownerHtml = '';
      if (shop.owner && shop.owner.name) {
        const ownerPhotoHtml = shop.owner.photo
          ? '<img src="' + escHtml(shop.owner.photo) + '" alt="' + escHtml(shop.owner.name) + '" style="width:48px;height:48px;border-radius:50%;object-fit:cover;">'
          : '<div class="owner-placeholder">' + escHtml(shop.owner.photoPlaceholder || '?') + '</div>';
        ownerHtml =
          '<div class="owner-section">' +
            '<div class="owner-section-label">Store Owner</div>' +
            '<div class="owner-card">' +
              ownerPhotoHtml +
              '<div>' +
                '<div class="owner-name">' + escHtml(shop.owner.name) + '</div>' +
                (shop.owner.bio ? '<div class="owner-bio">' + escHtml(shop.owner.bio) + '</div>' : '') +
              '</div>' +
            '</div>' +
          '</div>';
      }

      // Info rows
      const infoRows = [];
      if (shop.address) {
        infoRows.push(
          '<div class="info-row">' +
            '<span class="info-icon">📍</span>' +
            '<span class="info-label">住所</span>' +
            '<span class="info-value">' + escHtml(shop.address) + '</span>' +
          '</div>'
        );
      }
      if (shop.hours) {
        infoRows.push(
          '<div class="info-row">' +
            '<span class="info-icon">🕒</span>' +
            '<span class="info-label">営業時間</span>' +
            '<span class="info-value">' + escHtml(shop.hours) + '</span>' +
          '</div>'
        );
      }
      if (shop.closedDays) {
        infoRows.push(
          '<div class="info-row">' +
            '<span class="info-icon">📅</span>' +
            '<span class="info-label">定休日</span>' +
            '<span class="info-value">' + escHtml(shop.closedDays) + '</span>' +
          '</div>'
        );
      }
      if (shop.phone) {
        infoRows.push(
          '<div class="info-row">' +
            '<span class="info-icon">📞</span>' +
            '<span class="info-label">電話</span>' +
            '<span class="info-value"><a href="tel:' + escHtml(shop.phone) + '">' + escHtml(shop.phone) + '</a></span>' +
          '</div>'
        );
      }

      const infoSectionHtml = infoRows.length
        ? '<div class="info-section"><div class="info-section-title">基本情報</div>' + infoRows.join('') + '</div>'
        : '';

      // Action buttons
      const actionBtns = [];
      actionBtns.push(
        '<a class="action-btn primary" href="' + escHtml(shop.googleMapUrl) + '" target="_blank" rel="noopener">📍 Googleマップで見る</a>'
      );
      if (shop.instagramUrl) {
        actionBtns.push(
          '<a class="action-btn" href="' + escHtml(shop.instagramUrl) + '" target="_blank" rel="noopener">📷 Instagram</a>'
        );
      }
      if (shop.phone) {
        actionBtns.push(
          '<a class="action-btn" href="tel:' + escHtml(shop.phone) + '">📞 電話する</a>'
        );
      }
      if (shop.website) {
        actionBtns.push(
          '<a class="action-btn" href="' + escHtml(shop.website) + '" target="_blank" rel="noopener">🌐 Website</a>'
        );
      }

      const actionButtonsHtml = '<div class="action-buttons">' + actionBtns.join('') + '</div>';

      // Nearby shops (same area, exclude self)
      const nearby = shops.filter(s => s.area === shop.area && s.id !== shop.id);
      let nearbyHtml = '';
      if (nearby.length) {
        nearbyHtml =
          '<div class="nearby-section" id="nearby-section">' +
            '<div class="nearby-section-label">Same Area</div>' +
            '<div class="nearby-section-title">近く<span class="sm">の</span>ナッツのおすすめ</div>' +
            '<div class="nearby-scroll" id="nearby-scroll"></div>' +
          '</div>';
      }

      main.innerHTML =
        photoHtml +
        tagsHtml +
        '<h1 class="shop-name">' + escHtml(shop.name) + '</h1>' +
        nutsCommentHtml +
        ownerHtml +
        infoSectionHtml +
        actionButtonsHtml +
        nearbyHtml;

      // Render nearby cards
      if (nearby.length) {
        const scroll = document.getElementById('nearby-scroll');
        nearby.forEach(s => scroll.appendChild(buildNearbyCard(s)));
      }
    }

    (async () => {
      const id = getQueryId();
      if (!id) {
        window.location.replace('shops.html');
        return;
      }

      const data = await loadData();
      if (!data) {
        document.getElementById('main-content').innerHTML = '<div class="loading">データの読み込みに失敗しました。</div>';
        return;
      }

      const shop = data.shops.find(s => s.id === id);
      if (!shop) {
        window.location.replace('shops.html');
        return;
      }

      renderShop(shop, data.shops, data.curator);
    })();
  </script>
</body>
</html>
